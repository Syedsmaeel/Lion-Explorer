name: Lion Explorer AI Engine
on:
  repository_dispatch:
    types: [fusion-task]

permissions:
  issues: write

jobs:
  ai-think:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Fusion-Mind
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Parse payload directly from the event
          PROMPT='${{ github.event.client_payload.prompt }}'
          ISSUE_NUMBER='${{ github.event.client_payload.issue_number }}'
          
          # Run the AI logic
          RESPONSE=$(python3 lib/bot-logic/chat.py "$PROMPT")
          
          # Post the response
          if [ -n "$ISSUE_NUMBER" ]; then
             gh api -X POST /repos/${{ github.repository }}/issues/$ISSUE_NUMBER/comments -f body="🤖 **Lion Explorer AI Brain:** $RESPONSE"
          else
             echo "🤖 Lion Explorer AI Brain (No Issue Target): $RESPONSE" >> $GITHUB_STEP_SUMMARY
          fi
EOF
